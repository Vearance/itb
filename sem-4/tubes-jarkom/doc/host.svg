<svg xmlns="http://www.w3.org/2000/svg" width="220" height="165" viewBox="0 0 220 165" role="img" aria-labelledby="title desc">
  <title id="title">Network PC Icon</title>
  <desc id="desc">A simple Cisco Packet Tracer inspired desktop computer icon.</desc>
  <defs>
    <linearGradient id="monitorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f7fb"/>
      <stop offset="100%" stop-color="#cbd6e2"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eaf8ff"/>
      <stop offset="100%" stop-color="#78bfe8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="38" y="20" width="144" height="96" rx="9" fill="url(#monitorGrad)" stroke="#506070" stroke-width="3"/>
    <rect x="49" y="31" width="122" height="70" rx="4" fill="url(#screenGrad)" stroke="#697a8d" stroke-width="2"/>
    <path d="M58 86 C82 68, 103 92, 126 68 S156 84, 165 58" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    <circle cx="110" cy="109" r="3.5" fill="#566575"/>

    <path d="M96 116 L124 116 L130 143 L90 143 Z" fill="#b8c3cf" stroke="#566575" stroke-width="3" stroke-linejoin="round"/>
    <rect x="68" y="143" width="84" height="16" rx="5" fill="#d9e1ea" stroke="#566575" stroke-width="3"/>
  </g>
</svg>
