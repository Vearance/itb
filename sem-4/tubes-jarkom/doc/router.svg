<svg xmlns="http://www.w3.org/2000/svg" width="260" height="165" viewBox="0 0 260 165" role="img" aria-labelledby="title desc">
  <title id="title">Network Router Icon</title>
  <desc id="desc">A simple Cisco Packet Tracer inspired router icon with directional arrows.</desc>
  <defs>
    <radialGradient id="discGrad" cx="45%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="60%" stop-color="#c8d5e1"/>
      <stop offset="100%" stop-color="#8d9baa"/>
    </radialGradient>
    <linearGradient id="sideGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#abb9c7"/>
      <stop offset="100%" stop-color="#788795"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2f80c0"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="3" flood-color="#000000" flood-opacity="0.27"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <ellipse cx="130" cy="84" rx="89" ry="42" fill="url(#discGrad)" stroke="#506070" stroke-width="3"/>
    <path d="M41 84 C41 107, 81 128, 130 128 C179 128, 219 107, 219 84 L219 111 C219 134, 179 155, 130 155 C81 155, 41 134, 41 111 Z"
          fill="url(#sideGrad)" stroke="#506070" stroke-width="3" stroke-linejoin="round"/>
    <ellipse cx="130" cy="84" rx="89" ry="42" fill="none" stroke="#506070" stroke-width="3"/>

    <g stroke="#2f80c0" stroke-width="5" stroke-linecap="round" fill="none" marker-end="url(#arrowHead)">
      <path d="M130 86 L130 48"/>
      <path d="M130 86 L169 70"/>
      <path d="M130 86 L91 70"/>
      <path d="M130 86 L160 107"/>
      <path d="M130 86 L100 107"/>
    </g>

    <g fill="#eef8ff" stroke="#34495e" stroke-width="2">
      <rect x="84" y="125" width="20" height="13" rx="2"/>
      <rect x="111" y="129" width="20" height="13" rx="2"/>
      <rect x="138" y="129" width="20" height="13" rx="2"/>
      <rect x="165" y="125" width="20" height="13" rx="2"/>
    </g>
  </g>
</svg>
