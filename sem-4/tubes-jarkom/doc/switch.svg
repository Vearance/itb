<svg xmlns="http://www.w3.org/2000/svg" width="260" height="140" viewBox="0 0 260 140" role="img" aria-labelledby="title desc">
  <title id="title">Network Switch Icon</title>
  <desc id="desc">A simple Cisco Packet Tracer inspired network switch icon.</desc>
  <defs>
